<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <title>Verktilbod.is | Fáðu tilboð í verk</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: Inter, system-ui, sans-serif;
    }
  </style>
</head>

<body class="bg-slate-50">
  <div id="root"></div>

  <script type="text/babel">

const supabaseUrl = "https://nudrlkgxpsifoancrllp.supabase.co"

const supabaseKey = "sb_publishable_Y8Sum5qb52uoBH4IoXCt2Q_Z80QEEqs"

const supabase = window.supabase.createClient(
  supabaseUrl,
  supabaseKey
)

function App() {

  const [title, setTitle] = React.useState("")
  const [category, setCategory] = React.useState("")
  const [description, setDescription] = React.useState("")
  const [location, setLocation] = React.useState("")
  const [contact, setContact] = React.useState("")
  const [loading, setLoading] = React.useState(false)

  const categories = [
    "Smíði",
    "Rafmagn",
    "Pípulagnir",
    "Málun",
    "Þrif",
    "Flutningar",
    "Garðvinna",
    "Snjómokstur",
    "Bílaþjónusta",
    "Fasteignaþjónusta",
    "Þakvinna",
    "Annað"
  ]

  async function submitProject() {

    if (!title || !description || !contact) {
      alert("Vinsamlegast fylltu út nauðsynlegar upplýsingar.")
      return
    }

    setLoading(true)

    const { error } = await supabase
      .from("verkefni")
      .insert([
        {
          title,
          category,
          description,
          location,
          contact
        }
      ])

    setLoading(false)

    if (error) {
      console.log(error)
      alert("Villa kom upp við að senda verkefni.")
      return
    }

    alert("Verkefni sent inn!")

    setTitle("")
    setCategory("")
    setDescription("")
    setLocation("")
    setContact("")
  }

  return (
    <div className="min-h-screen text-slate-900">

      <nav className="sticky top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur-xl">

        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">

          <div className="flex items-center gap-3">

            <div className="w-11 h-11 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black text-lg shadow-sm">
              V
            </div>

            <div className="text-2xl font-black tracking-tight">
              Verktilbod<span className="text-blue-600">.is</span>
            </div>

          </div>

          <div className="hidden md:flex items-center gap-8 text-sm font-bold">

            <a href="#how" className="hover:text-blue-600 transition">
              Hvernig virkar þetta?
            </a>

            <a href="#flokkar" className="hover:text-blue-600 transition">
              Flokkar
            </a>

            <a href="#fyrirtaeki" className="hover:text-blue-600 transition">
              Fyrirtæki
            </a>

          </div>

        </div>

      </nav>

      <section className="relative overflow-hidden bg-white">

        <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,#dbeafe,transparent_35%)]"></div>

        <div className="relative max-w-7xl mx-auto px-6 py-24 lg:py-32 grid lg:grid-cols-2 gap-16 items-center">

          <div>

            <div className="inline-flex items-center gap-2 rounded-full bg-blue-50 px-4 py-2 text-sm font-bold text-blue-700 mb-8">
              🇮🇸 Íslenskur vettvangur fyrir verkefni og tilboð
            </div>

            <h1 className="text-5xl lg:text-7xl font-black tracking-tight leading-tight">
              Sendu inn verk.
              <span className="block text-blue-600">
                Fáðu tilboð.
              </span>
            </h1>

            <p className="mt-8 text-xl leading-relaxed text-slate-600 max-w-2xl">
              Verktilbod tengir einstaklinga og fyrirtæki við fagmenn.
              Settu inn verkefni og fáðu tilboð frá þjónustuaðilum á þínu svæði.
            </p>

          </div>

          <div className="rounded-[40px] border border-slate-200 bg-slate-50 p-5 shadow-2xl">

            <div className="rounded-[32px] bg-white p-7 shadow-sm">

              <h2 className="text-3xl font-black mb-6">
                Setja inn verkefni
              </h2>

              <div className="space-y-5">

                <input
                  value={title}
                  onChange={(e) => setTitle(e.target.value)}
                  className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600"
                  placeholder="Hvað þarf að gera?"
                />

                <select
                  value={category}
                  onChange={(e) => setCategory(e.target.value)}
                  className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600"
                >

                  <option value="">
                    Veldu flokk
                  </option>

                  {categories.map((category) => (
                    <option key={category}>
                      {category}
                    </option>
                  ))}

                </select>

                <textarea
                  value={description}
                  onChange={(e) => setDescription(e.target.value)}
                  className="w-full min-h-36 rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600"
                  placeholder="Lýstu verkefninu..."
                />

                <input
                  value={location}
                  onChange={(e) => setLocation(e.target.value)}
                  className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600"
                  placeholder="Staðsetning"
                />

                <input
                  value={contact}
                  onChange={(e) => setContact(e.target.value)}
                  className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600"
                  placeholder="Sími eða netfang"
                />

                <button
                  onClick={submitProject}
                  disabled={loading}
                  className="w-full rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white shadow-xl"
                >
                  {loading ? "Sendi..." : "Senda verkefni"}
                </button>

              </div>

            </div>

          </div>

        </div>

      </section>

      <section id="how" className="py-24">

        <div className="max-w-6xl mx-auto px-6">

          <div className="text-center mb-16">

            <h2 className="text-4xl lg:text-5xl font-black tracking-tight">
              Hvernig virkar þetta?
            </h2>

            <p className="text-xl text-slate-600 mt-4">
              Þrjú einföld skref frá verkefni yfir í tilboð.
            </p>

          </div>

          <div className="grid md:grid-cols-3 gap-8">

            {[
              ["1", "Settu inn verkefni", "Lýstu verkefninu og bættu við upplýsingum."],
              ["2", "Fáðu tilboð", "Fyrirtæki senda verð og upplýsingar."],
              ["3", "Veldu aðila", "Berðu saman tilboð og veldu réttan aðila."]
            ].map(([number, title, text]) => (

              <div
                key={number}
                className="rounded-[32px] border border-slate-200 bg-white p-8 shadow-sm"
              >

                <div className="w-14 h-14 rounded-2xl bg-blue-600 text-white flex items-center justify-center text-xl font-black mb-6">
                  {number}
                </div>

                <h3 className="text-2xl font-black mb-4">
                  {title}
                </h3>

                <p className="text-lg text-slate-600 leading-relaxed">
                  {text}
                </p>

              </div>

            ))}

          </div>

        </div>

      </section>

    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById("root"))
root.render(<App />)

  </script>
</body>
</html>
