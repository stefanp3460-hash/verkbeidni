<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verktilbod.is | Fáðu tilboð í verk</title>
  <meta name="description" content="Settu inn verkefni og fáðu tilboð frá skráðum fyrirtækjum og fagmönnum á Íslandi." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { font-family: Inter, system-ui, sans-serif; background: #f8fafc; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

const supabaseUrl = "https://nudrlkgxpsifoancrllp.supabase.co"
const supabaseKey = "sb_publishable_Y8Sum5qb52uoBH4IoXCt2Q_Z80QEEqs"

const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
emailjs.init("XsALRkOWypPfzP05T")

function App() {
  const [isAdminPage, setIsAdminPage] = React.useState(window.location.hash === "#admin")
  const [isAdmin, setIsAdmin] = React.useState(false)

  const [user, setUser] = React.useState(null)
  const [authEmail, setAuthEmail] = React.useState("")
  const [authPassword, setAuthPassword] = React.useState("")
  const [authMode, setAuthMode] = React.useState("login")
  const [authLoading, setAuthLoading] = React.useState(false)

  const [title, setTitle] = React.useState("")
  const [category, setCategory] = React.useState("")
  const [description, setDescription] = React.useState("")
  const [location, setLocation] = React.useState("")
  const [contact, setContact] = React.useState("")
  const [imageFile, setImageFile] = React.useState(null)
  const [loading, setLoading] = React.useState(false)

  const [projects, setProjects] = React.useState([])
  const [companies, setCompanies] = React.useState([])
  const [offers, setOffers] = React.useState([])

  const [companyName, setCompanyName] = React.useState("")
  const [companyKennitala, setCompanyKennitala] = React.useState("")
  const [companyCategory, setCompanyCategory] = React.useState("")
  const [companyPhone, setCompanyPhone] = React.useState("")
  const [companyEmail, setCompanyEmail] = React.useState("")
  const [companyAddress, setCompanyAddress] = React.useState("")
  const [companyWebsite, setCompanyWebsite] = React.useState("")
  const [companyDescription, setCompanyDescription] = React.useState("")
  const [companyLoading, setCompanyLoading] = React.useState(false)

  const [activeOfferProjectId, setActiveOfferProjectId] = React.useState(null)
  const [selectedCompanyId, setSelectedCompanyId] = React.useState("")
  const [offerPrice, setOfferPrice] = React.useState("")
  const [offerMessage, setOfferMessage] = React.useState("")
  const [offerLoading, setOfferLoading] = React.useState(false)

  const [filterCategory, setFilterCategory] = React.useState("")
  const [filterLocation, setFilterLocation] = React.useState("")

  const categories = [
    "Smíði",
    "Rafmagn",
    "Pípulagnir",
    "Málun",
    "Múrverk",
    "Flísalagnir",
    "Gólfefni",
    "Þakvinna",
    "Gluggar og hurðir",
    "Einangrun",
    "Jarðvinna",
    "Steypuvinna",
    "Pallasmíði",
    "Girðingar",
    "Garðvinna",
    "Trjáklippingar",
    "Snjómokstur",
    "Þrif",
    "Flutningar",
    "Bílaþjónusta",
    "Fasteignaþjónusta",
    "Ljósmyndun",
    "Vefsíðugerð",
    "Grafísk hönnun",
    "Bókhald",
    "Tölvuþjónusta",
    "Veitingaþjónusta",
    "Viðburðaþjónusta",
    "Öryggiskerfi",
    "Annað"
  ]

  React.useEffect(() => {
    loadSession()
    loadProjects()
    loadCompanies()
    loadOffers()

    function handleHashChange() {
      setIsAdminPage(window.location.hash === "#admin")
    }

    window.addEventListener("hashchange", handleHashChange)

    const { data: authListener } = supabase.auth.onAuthStateChange((_event, session) => {
      const currentUser = session?.user || null
      setUser(currentUser)
      checkAdmin(currentUser)
    })

    return () => {
      window.removeEventListener("hashchange", handleHashChange)
      authListener.subscription.unsubscribe()
    }
  }, [])

  async function loadSession() {
    const { data } = await supabase.auth.getSession()
    const currentUser = data.session?.user || null
    setUser(currentUser)
    checkAdmin(currentUser)
  }

  async function checkAdmin(currentUser) {
    if (!currentUser) {
      setIsAdmin(false)
      return
    }

    const { data, error } = await supabase
      .from("admins")
      .select("*")
      .eq("email", currentUser.email)
      .maybeSingle()

    if (error) {
      console.log(error)
      setIsAdmin(false)
      return
    }

    setIsAdmin(!!data)
  }

  async function loadProjects() {
    const { data, error } = await supabase
      .from("verkefni")
      .select("*")
      .order("created_at", { ascending: false })

    if (error) {
      console.log(error)
      return
    }

    setProjects(data || [])
  }

  async function loadCompanies() {
    const { data, error } = await supabase
      .from("fyrirtaeki")
      .select("*")
      .order("created_at", { ascending: false })

    if (error) {
      console.log(error)
      return
    }

    setCompanies(data || [])
  }

  async function loadOffers() {
    const { data, error } = await supabase
      .from("tilbod")
      .select("*")
      .order("created_at", { ascending: false })

    if (error) {
      console.log(error)
      return
    }

    setOffers(data || [])
  }

  async function handleAuth() {
    if (!authEmail || !authPassword) {
      alert("Settu inn netfang og lykilorð.")
      return
    }

    setAuthLoading(true)

    if (authMode === "signup") {
      const { error } = await supabase.auth.signUp({
        email: authEmail,
        password: authPassword
      })

      setAuthLoading(false)

      if (error) {
        console.log(error)
        alert("Villa við nýskráningu.")
        return
      }

      alert("Aðgangur stofnaður. Þú getur nú sett inn verkefni eða skráð fyrirtæki.")
      setAuthEmail("")
      setAuthPassword("")
      return
    }

    const { error } = await supabase.auth.signInWithPassword({
      email: authEmail,
      password: authPassword
    })

    setAuthLoading(false)

    if (error) {
      console.log(error)
      alert("Rangt netfang eða lykilorð.")
      return
    }

    alert("Innskráning tókst.")
    setAuthEmail("")
    setAuthPassword("")
  }

  async function logout() {
    await supabase.auth.signOut()
    setUser(null)
    setIsAdmin(false)
  }

  async function uploadImage() {
    if (!imageFile) return null

    const fileExt = imageFile.name.split(".").pop()
    const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`

    const { error } = await supabase.storage
      .from("verkefni-myndir")
      .upload(fileName, imageFile)

    if (error) {
      console.log(error)
      alert("Mynd náði ekki að uploadast.")
      return null
    }

    const { data } = supabase.storage
      .from("verkefni-myndir")
      .getPublicUrl(fileName)

    return data.publicUrl
  }

  async function submitProject() {
    if (!user) {
      alert("Þú þarft að stofna aðgang eða skrá þig inn áður en þú setur inn verkefni.")
      window.location.hash = "#login"
      return
    }

    if (!title || !description || !contact) {
      alert("Vinsamlegast fylltu út titil, lýsingu og síma/netfang.")
      return
    }

    setLoading(true)

    const imageUrl = await uploadImage()

    const { error } = await supabase
      .from("verkefni")
      .insert([
        {
          title,
          category,
          description,
          location,
          contact,
          image_url: imageUrl,
          user_id: user.id,
          status: "opið"
        }
      ])

    setLoading(false)

    if (error) {
      console.log(error)
      alert("Villa kom upp við að senda verkefni.")
      return
    }

    alert("Verkefni sent inn!")

    setTitle("")
    setCategory("")
    setDescription("")
    setLocation("")
    setContact("")
    setImageFile(null)

    loadProjects()
  }

  async function submitCompany() {
    if (!user) {
      alert("Þú þarft að stofna aðgang eða skrá þig inn áður en þú skráir fyrirtæki.")
      window.location.hash = "#login"
      return
    }

    if (!companyName || !companyKennitala || !companyCategory || !companyPhone || !companyEmail) {
      alert("Til að skrá fyrirtæki þarftu að fylla út: nafn, kennitölu, flokk, síma og netfang.")
      return
    }

    setCompanyLoading(true)

    const { error } = await supabase
      .from("fyrirtaeki")
      .insert([
        {
          company_name: companyName,
          kennitala: companyKennitala,
          category: companyCategory,
          contact: companyPhone + " / " + companyEmail,
          phone: companyPhone,
          email: companyEmail,
          address: companyAddress,
          website: companyWebsite,
          description: companyDescription,
          verified: false,
          user_id: user.id
        }
      ])

    setCompanyLoading(false)

    if (error) {
      console.log(error)
      alert("Villa kom upp við að skrá fyrirtæki.")
      return
    }

    alert("Fyrirtæki skráð. Þú getur nú sent tilboð.")

    setCompanyName("")
    setCompanyKennitala("")
    setCompanyCategory("")
    setCompanyPhone("")
    setCompanyEmail("")
    setCompanyAddress("")
    setCompanyWebsite("")
    setCompanyDescription("")

    loadCompanies()
  }

  async function submitOffer(projectId) {
    if (!user) {
      alert("Þú þarft að vera skráður inn sem fyrirtæki til að senda tilboð.")
      window.location.hash = "#login"
      return
    }

    const userCompanies = companies.filter((company) => company.user_id === user.id)

    if (userCompanies.length === 0) {
      alert("Þú þarft fyrst að skrá fyrirtæki með kennitölu og helstu upplýsingum áður en þú getur sent tilboð.")
      window.location.hash = "#fyrirtaeki"
      return
    }

    const selectedCompany = userCompanies.find((company) => String(company.id) === String(selectedCompanyId))

    if (!selectedCompany) {
      alert("Veldu fyrirtæki sem sendir tilboðið.")
      return
    }

    if (!selectedCompany.company_name || !selectedCompany.kennitala || !selectedCompany.category || !selectedCompany.phone || !selectedCompany.email) {
      alert("Fyrirtækið vantar helstu upplýsingar. Farðu í fyrirtækjaskráningu og fylltu út nafn, kennitölu, flokk, síma og netfang.")
      return
    }

    if (!offerPrice) {
      alert("Settu inn verð fyrir tilboðið.")
      return
    }

    setOfferLoading(true)

    const { error } = await supabase
      .from("tilbod")
      .insert([
        {
          project_id: projectId,
          company_name: selectedCompany.company_name,
          price: offerPrice,
          message: offerMessage,
          contact: selectedCompany.phone + " / " + selectedCompany.email,
          user_id: user.id
        }
      ])

    setOfferLoading(false)

    if (error) {
      console.log(error)
      alert("Villa kom upp við að senda tilboð.")
      return
    }

    try {
      await emailjs.send(
        "service_p90mrr8",
        "template_6fp7aiu",
        {
          title: "Nýtt tilboð á verkefni",
          name: selectedCompany.company_name,
          email: selectedCompany.email,
          message:
            "Nýtt tilboð hefur verið sent inn á Verktilbod.is\n\n" +
            "Fyrirtæki: " + selectedCompany.company_name + "\n" +
            "Kennitala: " + selectedCompany.kennitala + "\n" +
            "Verð: " + offerPrice + "\n" +
            "Sími: " + selectedCompany.phone + "\n" +
            "Netfang: " + selectedCompany.email + "\n\n" +
            "Skilaboð:\n" + (offerMessage || "Engin skilaboð")
        }
      )
    } catch (emailError) {
      console.log("EmailJS villa:", emailError)
    }

    alert("Tilboð sent inn!")

    setSelectedCompanyId("")
    setOfferPrice("")
    setOfferMessage("")
    setActiveOfferProjectId(null)

    loadOffers()
  }

  async function acceptOffer(projectId, offerId) {
    if (!user) {
      alert("Þú þarft að vera skráður inn til að samþykkja tilboð.")
      return
    }

    const project = projects.find((p) => p.id === projectId)

    if (!project || project.user_id !== user.id) {
      alert("Þú getur aðeins samþykkt tilboð á verkefni sem þú settir sjálfur inn.")
      return
    }

    if (!confirm("Ertu viss um að þú viljir samþykkja þetta tilboð?")) return

    const { error } = await supabase
      .from("verkefni")
      .update({
        status: "samþykkt",
        selected_offer_id: offerId
      })
      .eq("id", projectId)

    if (error) {
      console.log(error)
      alert("Villa kom upp við að samþykkja tilboð.")
      return
    }

    alert("Tilboð samþykkt.")
    loadProjects()
  }

  async function deleteProject(projectId) {
    if (!isAdmin) {
      alert("Aðeins admin getur eytt verkefnum.")
      return
    }

    if (!confirm("Eyða þessu verkefni? Öll tilboð tengd því eyðast líka.")) return

    await supabase.from("tilbod").delete().eq("project_id", projectId)
    await supabase.from("verkefni").delete().eq("id", projectId)

    loadProjects()
    loadOffers()
  }

  async function deleteCompany(companyId) {
    if (!isAdmin) {
      alert("Aðeins admin getur eytt fyrirtækjum.")
      return
    }

    if (!confirm("Eyða þessu fyrirtæki?")) return

    await supabase.from("fyrirtaeki").delete().eq("id", companyId)
    loadCompanies()
  }

  async function deleteOffer(offerId) {
    if (!isAdmin) {
      alert("Aðeins admin getur eytt tilboðum.")
      return
    }

    if (!confirm("Eyða þessu tilboði?")) return

    await supabase.from("tilbod").delete().eq("id", offerId)
    loadOffers()
  }

  async function toggleVerified(company) {
    if (!isAdmin) {
      alert("Aðeins admin getur breytt verified stöðu.")
      return
    }

    await supabase
      .from("fyrirtaeki")
      .update({ verified: !company.verified })
      .eq("id", company.id)

    loadCompanies()
  }

  function getOffersForProject(projectId) {
    return offers.filter((offer) => offer.project_id === projectId)
  }

  const filteredProjects = projects.filter((project) => {
    const categoryMatch = filterCategory ? project.category === filterCategory : true
    const locationMatch = filterLocation
      ? (project.location || "").toLowerCase().includes(filterLocation.toLowerCase())
      : true

    return categoryMatch && locationMatch
  })

  const myCompanies = user ? companies.filter((company) => company.user_id === user.id) : []
  const myOffers = user ? offers.filter((offer) => offer.user_id === user.id) : []
  const myProjects = user ? projects.filter((project) => project.user_id === user.id) : []

  if (isAdminPage) {
    return (
      <div className="min-h-screen bg-white text-slate-900">
        <section className="py-20">
          <div className="max-w-6xl mx-auto px-6">

            {!user ? (
              <div className="max-w-md mx-auto rounded-[32px] border border-slate-200 bg-slate-50 p-8">
                <h2 className="text-3xl font-black mb-6 text-center">Admin innskráning</h2>
                <p className="text-slate-600 text-center mb-6">Skráðu þig inn með admin netfangi.</p>

                <div className="grid gap-5">
                  <input value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Netfang" />
                  <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Lykilorð" />

                  <button onClick={handleAuth} disabled={authLoading} className="rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white">
                    {authLoading ? "Augnablik..." : "Innskrá"}
                  </button>
                </div>
              </div>
            ) : !isAdmin ? (
              <div className="max-w-xl mx-auto rounded-[32px] border border-red-200 bg-red-50 p-8 text-center">
                <h2 className="text-3xl font-black text-red-800 mb-4">Ekki admin aðgangur</h2>
                <p className="text-red-700">Þetta netfang hefur ekki admin heimild.</p>
                <button onClick={logout} className="mt-6 rounded-2xl bg-slate-950 px-6 py-4 font-black text-white">Skrá út</button>
              </div>
            ) : (
              <div>
                <div className="mb-14 flex flex-col md:flex-row md:items-center md:justify-between gap-5">
                  <div>
                    <h1 className="text-5xl font-black tracking-tight">Admin Dashboard</h1>
                    <p className="text-slate-600 text-lg mt-3">Verkefni, fyrirtæki og tilboð.</p>
                  </div>

                  <button onClick={logout} className="rounded-2xl bg-slate-950 px-6 py-4 font-black text-white hover:bg-slate-800 transition">
                    Skrá út
                  </button>
                </div>

                <div className="grid lg:grid-cols-3 gap-8">
                  <div>
                    <h3 className="text-2xl font-black mb-6">Verkefni</h3>

                    <div className="space-y-5">
                      {projects.map((project) => (
                        <div key={project.id} className="rounded-3xl border border-slate-200 bg-slate-50 p-6">
                          {project.image_url && (
                            <img src={project.image_url} className="mb-4 h-40 w-full rounded-2xl object-cover" />
                          )}

                          <div className="mb-3 text-sm font-black text-blue-700">{project.status || "opið"}</div>
                          <h4 className="text-xl font-black">{project.title}</h4>
                          <p className="text-slate-600 mt-3">{project.description}</p>

                          <div className="mt-4 text-sm text-slate-500">📍 {project.location || "Óskráð"}</div>
                          <div className="mt-2 text-sm font-bold text-blue-700">📞 {project.contact}</div>

                          <button onClick={() => deleteProject(project.id)} className="mt-5 rounded-2xl bg-red-600 px-4 py-3 text-sm font-black text-white hover:bg-red-700 transition">
                            Eyða verkefni
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h3 className="text-2xl font-black mb-6">Fyrirtæki</h3>

                    <div className="space-y-5">
                      {companies.map((company) => (
                        <div key={company.id} className="rounded-3xl border border-slate-200 bg-slate-50 p-6">
                          <h4 className="text-xl font-black">{company.company_name}</h4>

                          <div className="mt-3 text-sm text-blue-700 font-bold">{company.category || "Óskráð"}</div>
                          <div className="mt-2 text-sm text-slate-500">Kennitala: {company.kennitala || "Óskráð"}</div>
                          <div className="mt-2 text-sm text-slate-500">Sími: {company.phone || "Óskráð"}</div>
                          <div className="mt-2 text-sm text-slate-500">Email: {company.email || "Óskráð"}</div>

                          <div className="mt-4 text-sm font-bold">{company.verified ? "✅ Verified" : "Ekki verified"}</div>

                          <div className="mt-5 flex flex-wrap gap-3">
                            <button onClick={() => toggleVerified(company)} className="rounded-2xl bg-blue-600 px-4 py-3 text-sm font-black text-white hover:bg-blue-700 transition">
                              {company.verified ? "Taka verified af" : "Gera verified"}
                            </button>

                            <button onClick={() => deleteCompany(company.id)} className="rounded-2xl bg-red-600 px-4 py-3 text-sm font-black text-white hover:bg-red-700 transition">
                              Eyða
                            </button>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>

                  <div>
                    <h3 className="text-2xl font-black mb-6">Tilboð</h3>

                    <div className="space-y-5">
                      {offers.map((offer) => {
                        const project = projects.find((p) => p.id === offer.project_id)

                        return (
                          <div key={offer.id} className="rounded-3xl border border-slate-200 bg-slate-50 p-6">
                            <div className="text-sm font-bold text-blue-700 mb-3">{project ? project.title : "Óþekkt verkefni"}</div>
                            <h4 className="text-xl font-black">{offer.company_name}</h4>
                            <div className="mt-3 text-2xl font-black text-green-700">{offer.price}</div>
                            <p className="text-slate-600 mt-3">{offer.message || "Engin skilaboð"}</p>
                            <div className="mt-3 text-sm text-slate-500">📞 {offer.contact}</div>

                            <button onClick={() => deleteOffer(offer.id)} className="mt-5 rounded-2xl bg-red-600 px-4 py-3 text-sm font-black text-white hover:bg-red-700 transition">
                              Eyða tilboði
                            </button>
                          </div>
                        )
                      })}
                    </div>
                  </div>
                </div>
              </div>
            )}
          </div>
        </section>
      </div>
    )
  }

  return (
    <div className="min-h-screen text-slate-900">
      <nav className="sticky top-0 z-50 border-b border-slate-200 bg-white/90 backdrop-blur-xl">
        <div className="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
          <div className="flex items-center gap-3">
            <div className="w-11 h-11 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black text-lg shadow-sm">V</div>
            <div className="text-2xl font-black tracking-tight">Verktilbod<span className="text-blue-600">.is</span></div>
          </div>

          <div className="hidden md:flex items-center gap-8 text-sm font-bold">
            <a href="#projects" className="hover:text-blue-600 transition">Verkefni</a>
            <a href="#login" className="hover:text-blue-600 transition">{user ? "Dashboard" : "Innskráning"}</a>
            <a href="#fyrirtaeki" className="hover:text-blue-600 transition">Fyrirtæki</a>
          </div>
        </div>
      </nav>

      <section className="relative overflow-hidden bg-white">
        <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,#dbeafe,transparent_35%)]"></div>

        <div className="relative max-w-7xl mx-auto px-6 py-20 lg:py-32 grid lg:grid-cols-2 gap-16 items-center">
          <div>
            <div className="inline-flex items-center gap-2 rounded-full bg-blue-50 px-4 py-2 text-sm font-bold text-blue-700 mb-8">
              🇮🇸 Íslenskur vettvangur fyrir verkefni og tilboð
            </div>

            <h1 className="text-5xl lg:text-7xl font-black tracking-tight leading-tight">
              Sendu inn verk.
              <span className="block text-blue-600">Fáðu tilboð.</span>
            </h1>

            <p className="mt-8 text-xl leading-relaxed text-slate-600 max-w-2xl">
              Verktilbod tengir einstaklinga og fyrirtæki við fagmenn. Notendur þurfa að skrá sig inn til að setja inn verkefni og fyrirtæki þurfa að vera skráð til að senda tilboð.
            </p>
          </div>

          <div className="rounded-[40px] border border-slate-200 bg-slate-50 p-5 shadow-2xl">
            <div className="rounded-[32px] bg-white p-7 shadow-sm">
              <h2 className="text-3xl font-black mb-6">Setja inn verkefni</h2>

              {!user && (
                <div className="mb-5 rounded-2xl bg-red-50 border border-red-200 p-4 text-sm font-bold text-red-800">
                  Þú þarft að stofna aðgang eða skrá þig inn áður en þú setur inn verkefni.
                  <br />
                  <a href="#login" className="underline">Fara í innskráningu</a>
                </div>
              )}

              <div className="space-y-5">
                <input value={title} onChange={(e) => setTitle(e.target.value)} disabled={!user} className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 disabled:bg-slate-100" placeholder="Hvað þarf að gera?" />

                <select value={category} onChange={(e) => setCategory(e.target.value)} disabled={!user} className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 disabled:bg-slate-100">
                  <option value="">Veldu flokk</option>
                  {categories.map((category) => <option key={category}>{category}</option>)}
                </select>

                <textarea value={description} onChange={(e) => setDescription(e.target.value)} disabled={!user} className="w-full min-h-36 rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 disabled:bg-slate-100" placeholder="Lýstu verkefninu..." />

                <input value={location} onChange={(e) => setLocation(e.target.value)} disabled={!user} className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 disabled:bg-slate-100" placeholder="Staðsetning" />

                <input value={contact} onChange={(e) => setContact(e.target.value)} disabled={!user} className="w-full rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 disabled:bg-slate-100" placeholder="Sími eða netfang" />

                <input type="file" accept="image/*" disabled={!user} onChange={(e) => setImageFile(e.target.files[0])} className="w-full rounded-2xl border border-slate-300 px-5 py-4 bg-white disabled:bg-slate-100" />

                <button onClick={submitProject} disabled={loading || !user} className="w-full rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white shadow-xl disabled:bg-slate-400">
                  {loading ? "Sendi..." : "Senda verkefni"}
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>

      <section id="projects" className="py-24 bg-white border-t border-slate-200">
        <div className="max-w-6xl mx-auto px-6">
          <div className="mb-12">
            <h2 className="text-4xl font-black tracking-tight">Nýjustu verkefni</h2>
            <p className="text-slate-600 text-lg mt-3">Aðeins skráð fyrirtæki geta sent tilboð.</p>
          </div>

          <div className="mb-10 grid md:grid-cols-2 gap-4">
            <select value={filterCategory} onChange={(e) => setFilterCategory(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 bg-white">
              <option value="">Allir flokkar</option>
              {categories.map((category) => <option key={category}>{category}</option>)}
            </select>

            <input value={filterLocation} onChange={(e) => setFilterLocation(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600 bg-white" placeholder="Leita eftir staðsetningu" />
          </div>

          <div className="grid gap-6">
            {filteredProjects.length === 0 && (
              <div className="rounded-3xl border border-dashed border-slate-300 bg-slate-50 p-12 text-center">
                <h3 className="text-2xl font-black mb-3">Engin verkefni fundust</h3>
                <p className="text-slate-600">Prófaðu annan flokk eða staðsetningu.</p>
              </div>
            )}

            {filteredProjects.map((project) => (
              <div key={project.id} className="rounded-3xl border border-slate-200 bg-slate-50 p-7 shadow-sm">
                {project.image_url && <img src={project.image_url} className="mb-6 h-64 w-full rounded-3xl object-cover" />}

                <div className="flex flex-col md:flex-row md:items-start md:justify-between gap-6">
                  <div className="flex-1">
                    <div className="inline-flex rounded-full bg-blue-100 px-3 py-1 text-sm font-bold text-blue-700 mb-4">{project.category || "Annað"}</div>

                    <h3 className="text-2xl font-black">{project.title}</h3>
                    <p className="text-slate-600 mt-3 leading-relaxed">{project.description}</p>

                    <div className="mt-4 text-sm text-slate-500">📍 {project.location || "Óskráð"}</div>
                    <div className="mt-4 text-sm font-bold text-green-700">{getOffersForProject(project.id).length} tilboð komin</div>

                    {project.status === "samþykkt" && (
                      <div className="mt-4 inline-flex rounded-full bg-green-100 px-4 py-2 text-sm font-black text-green-700">
                        Tilboð samþykkt
                      </div>
                    )}
                  </div>

                  <div className="w-full md:w-[300px]">
                    <button onClick={() => setActiveOfferProjectId(activeOfferProjectId === project.id ? null : project.id)} className="w-full rounded-2xl bg-slate-950 px-5 py-4 text-white font-black hover:bg-slate-800 transition">
                      Senda tilboð
                    </button>
                  </div>
                </div>

                {activeOfferProjectId === project.id && (
                  <div className="mt-7 rounded-3xl border border-slate-200 bg-white p-6">
                    <h4 className="text-xl font-black mb-5">Senda tilboð í þetta verkefni</h4>

                    {!user && (
                      <div className="rounded-2xl bg-red-50 border border-red-200 p-5 text-red-800 font-bold">
                        Þú þarft að vera skráður inn sem fyrirtæki til að senda tilboð.
                        <br />
                        <a href="#login" className="underline">Fara í innskráningu</a>
                      </div>
                    )}

                    {user && myCompanies.length === 0 && (
                      <div className="rounded-2xl bg-yellow-50 border border-yellow-200 p-5 text-yellow-800 font-bold">
                        Þú þarft fyrst að skrá fyrirtæki með kennitölu, flokki, síma og netfangi áður en þú getur sent tilboð.
                        <br />
                        <a href="#fyrirtaeki" className="underline">Fara í fyrirtækjaskráningu</a>
                      </div>
                    )}

                    {user && myCompanies.length > 0 && (
                      <div className="grid gap-4">
                        <select value={selectedCompanyId} onChange={(e) => setSelectedCompanyId(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600">
                          <option value="">Veldu fyrirtæki</option>
                          {myCompanies.map((company) => (
                            <option key={company.id} value={company.id}>
                              {company.company_name} - {company.kennitala}
                            </option>
                          ))}
                        </select>

                        <input value={offerPrice} onChange={(e) => setOfferPrice(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Verð, t.d. 120.000 kr" />

                        <textarea value={offerMessage} onChange={(e) => setOfferMessage(e.target.value)} className="min-h-28 rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Skilaboð / tímarammi" />

                        <button onClick={() => submitOffer(project.id)} disabled={offerLoading} className="rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white">
                          {offerLoading ? "Sendi..." : "Senda tilboð"}
                        </button>
                      </div>
                    )}
                  </div>
                )}
              </div>
            ))}
          </div>
        </div>
      </section>

      <section id="login" className="py-24">
        <div className="max-w-6xl mx-auto px-6">
          <div className="grid lg:grid-cols-2 gap-10 items-start">
            <div>
              <h2 className="text-4xl lg:text-5xl font-black tracking-tight">Aðgangur</h2>
              <p className="text-xl text-slate-600 mt-6 leading-relaxed">
                Notendur þurfa að skrá sig inn til að setja inn verkefni og samþykkja tilboð. Fyrirtæki þurfa að skrá fyrirtæki áður en þau senda tilboð.
              </p>
            </div>

            <div className="rounded-[32px] border border-slate-200 bg-white p-7 shadow-sm">
              {!user ? (
                <div>
                  <h3 className="text-2xl font-black mb-6">{authMode === "login" ? "Innskráning" : "Stofna aðgang"}</h3>

                  <div className="grid gap-5">
                    <input value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Netfang" />

                    <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Lykilorð" />

                    <button onClick={handleAuth} disabled={authLoading} className="rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white">
                      {authLoading ? "Augnablik..." : authMode === "login" ? "Innskrá" : "Stofna aðgang"}
                    </button>

                    <button onClick={() => setAuthMode(authMode === "login" ? "signup" : "login")} className="text-sm font-bold text-blue-700">
                      {authMode === "login" ? "Ég vil stofna aðgang" : "Ég er nú þegar með aðgang"}
                    </button>
                  </div>
                </div>
              ) : (
                <div>
                  <h3 className="text-2xl font-black mb-3">Þú ert skráður inn</h3>
                  <p className="text-slate-600 mb-6">{user.email}</p>

                  <button onClick={logout} className="rounded-2xl bg-slate-950 px-6 py-4 font-black text-white hover:bg-slate-800 transition">
                    Skrá út
                  </button>
                </div>
              )}
            </div>
          </div>

          {user && (
            <div className="mt-14 grid lg:grid-cols-3 gap-10">
              <div className="rounded-[32px] border border-slate-200 bg-white p-7 shadow-sm">
                <h3 className="text-2xl font-black mb-6">Mín verkefni</h3>

                {myProjects.length === 0 && <p className="text-slate-600">Þú hefur ekki sett inn verkefni.</p>}

                <div className="space-y-5">
                  {myProjects.map((project) => (
                    <div key={project.id} className="rounded-3xl bg-slate-50 border border-slate-200 p-6">
                      <h4 className="text-xl font-black">{project.title}</h4>
                      <p className="mt-2 text-sm text-slate-600">{project.description}</p>

                      <div className="mt-3 text-sm font-bold text-blue-700">{project.status || "opið"}</div>

                      <div className="mt-5 space-y-3">
                        {getOffersForProject(project.id).map((offer) => (
                          <div key={offer.id} className="rounded-2xl bg-white border border-slate-200 p-4">
                            <div className="font-black">{offer.company_name}</div>
                            <div className="text-green-700 font-black mt-1">{offer.price}</div>
                            <div className="text-sm text-slate-600 mt-2">{offer.message}</div>

                            {project.selected_offer_id === offer.id ? (
                              <div className="mt-3 text-sm font-black text-green-700">Samþykkt tilboð</div>
                            ) : (
                              <button onClick={() => acceptOffer(project.id, offer.id)} className="mt-3 rounded-2xl bg-green-600 px-4 py-3 text-sm font-black text-white hover:bg-green-700 transition">
                                Samþykkja tilboð
                              </button>
                            )}
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>

              <div className="rounded-[32px] border border-slate-200 bg-white p-7 shadow-sm">
                <h3 className="text-2xl font-black mb-6">Mín fyrirtæki</h3>

                {myCompanies.length === 0 && <p className="text-slate-600">Þú hefur ekki skráð fyrirtæki ennþá.</p>}

                <div className="space-y-5">
                  {myCompanies.map((company) => (
                    <div key={company.id} className="rounded-3xl bg-slate-50 border border-slate-200 p-6">
                      <div className="text-sm font-black text-green-700 mb-3">{company.verified ? "✅ Verified" : "Í skoðun"}</div>
                      <h4 className="text-xl font-black">{company.company_name}</h4>
                      <p className="mt-2 text-sm font-bold text-blue-700">{company.category || "Óskráð"}</p>
                      <p className="mt-2 text-sm text-slate-500">Kennitala: {company.kennitala}</p>
                    </div>
                  ))}
                </div>
              </div>

              <div className="rounded-[32px] border border-slate-200 bg-white p-7 shadow-sm">
                <h3 className="text-2xl font-black mb-6">Mín tilboð</h3>

                {myOffers.length === 0 && <p className="text-slate-600">Þú hefur ekki sent nein tilboð.</p>}

                <div className="space-y-5">
                  {myOffers.map((offer) => {
                    const project = projects.find((p) => p.id === offer.project_id)

                    return (
                      <div key={offer.id} className="rounded-3xl bg-slate-50 border border-slate-200 p-6">
                        <div className="text-sm font-bold text-blue-700 mb-3">{project ? project.title : "Óþekkt verkefni"}</div>
                        <h4 className="text-xl font-black">{offer.company_name}</h4>
                        <p className="mt-2 text-2xl font-black text-green-700">{offer.price}</p>
                        <p className="mt-3 text-slate-600">{offer.message || "Engin skilaboð"}</p>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      </section>

      <section id="fyrirtaeki" className="py-24 bg-white border-t border-slate-200">
        <div className="max-w-6xl mx-auto px-6">
          <div className="rounded-[44px] bg-slate-950 p-10 lg:p-16 text-white shadow-2xl">
            <div className="grid lg:grid-cols-2 gap-12 items-center">
              <div>
                <h2 className="text-4xl lg:text-5xl font-black tracking-tight">Skrá fyrirtæki</h2>
                <p className="text-xl text-slate-300 mt-6 leading-relaxed">
                  Til að senda tilboð þarf að vera með skráð fyrirtæki með kennitölu og helstu upplýsingum.
                </p>
              </div>

              <div className="rounded-[32px] bg-white p-7 text-slate-900">
                <div className="grid gap-5">
                  {!user && <div className="rounded-2xl bg-yellow-50 border border-yellow-200 p-4 text-sm font-bold text-yellow-800">Þú þarft að vera skráður inn til að skrá fyrirtæki.</div>}

                  <input value={companyName} onChange={(e) => setCompanyName(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Nafn fyrirtækis *" />

                  <input value={companyKennitala} onChange={(e) => setCompanyKennitala(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Kennitala fyrirtækis *" />

                  <select value={companyCategory} onChange={(e) => setCompanyCategory(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600">
                    <option value="">Veldu flokk *</option>
                    {categories.map((category) => <option key={category}>{category}</option>)}
                  </select>

                  <input value={companyPhone} onChange={(e) => setCompanyPhone(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Sími *" />

                  <input value={companyEmail} onChange={(e) => setCompanyEmail(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Netfang *" />

                  <input value={companyAddress} onChange={(e) => setCompanyAddress(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Heimilisfang" />

                  <input value={companyWebsite} onChange={(e) => setCompanyWebsite(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Vefsíða" />

                  <textarea value={companyDescription} onChange={(e) => setCompanyDescription(e.target.value)} className="min-h-28 rounded-2xl border border-slate-300 px-5 py-4 outline-none focus:border-blue-600" placeholder="Lýsing á fyrirtæki" />

                  <button onClick={submitCompany} disabled={companyLoading || !user} className="rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white disabled:bg-slate-400">
                    {companyLoading ? "Skrái..." : "Skrá fyrirtæki"}
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-14 grid md:grid-cols-3 gap-6">
            {companies.filter((c) => c.verified).slice(0, 6).map((company) => (
              <div key={company.id} className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div className="text-sm font-black text-green-700 mb-3">✅ Verified</div>
                <h3 className="text-xl font-black">{company.company_name}</h3>
                <p className="mt-2 text-sm text-blue-700 font-bold">{company.category || "Óskráð"}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      <footer className="border-t border-slate-200 bg-white py-10">
        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-2xl bg-blue-600 text-white flex items-center justify-center font-black">V</div>
            <div className="text-2xl font-black tracking-tight">Verktilbod<span className="text-blue-600">.is</span></div>
          </div>

          <div className="text-sm text-slate-500">© 2026 Verktilbod — Sendu inn verk. Fáðu tilboð.</div>
        </div>
      </footer>
    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById("root"))
root.render(<App />)

  </script>
</body>
</html>
