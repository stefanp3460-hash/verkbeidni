<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Verktilbod.is | Fáðu tilboð í verk</title>
  <meta name="description" content="Verktilbod.is tengir fólk sem vantar þjónustu við skráð fyrirtæki og fagmenn á Íslandi." />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    html { scroll-behavior: smooth; }
    body { font-family: Inter, system-ui, sans-serif; background: #f8fafc; }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">

const supabaseUrl = "https://nudrlkgxpsifoancrllp.supabase.co"
const supabaseKey = "sb_publishable_Y8Sum5qb52uoBH4IoXCt2Q_Z80QEEqs"
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey)
emailjs.init("XsALRkOWypPfzP05T")

function App() {
  const [isAdminPage, setIsAdminPage] = React.useState(window.location.hash === "#admin")
  const [isAdmin, setIsAdmin] = React.useState(false)

  const [user, setUser] = React.useState(null)
  const [authEmail, setAuthEmail] = React.useState("")
  const [authPassword, setAuthPassword] = React.useState("")
  const [authMode, setAuthMode] = React.useState("login")
  const [authLoading, setAuthLoading] = React.useState(false)

  const [title, setTitle] = React.useState("")
  const [category, setCategory] = React.useState("")
  const [description, setDescription] = React.useState("")
  const [location, setLocation] = React.useState("")
  const [contact, setContact] = React.useState("")
  const [imageFile, setImageFile] = React.useState(null)
  const [mapLat, setMapLat] = React.useState(64.1265)
  const [mapLng, setMapLng] = React.useState(-21.8174)
  const [loading, setLoading] = React.useState(false)

  const [projects, setProjects] = React.useState([])
  const [companies, setCompanies] = React.useState([])
  const [offers, setOffers] = React.useState([])
  const [reviews, setReviews] = React.useState([])

  const [companyName, setCompanyName] = React.useState("")
  const [companyKennitala, setCompanyKennitala] = React.useState("")
  const [companyCategory, setCompanyCategory] = React.useState("")
  const [companyPhone, setCompanyPhone] = React.useState("")
  const [companyEmail, setCompanyEmail] = React.useState("")
  const [companyAddress, setCompanyAddress] = React.useState("")
  const [companyWebsite, setCompanyWebsite] = React.useState("")
  const [companyDescription, setCompanyDescription] = React.useState("")
  const [companyLoading, setCompanyLoading] = React.useState(false)

  const [activeOfferProjectId, setActiveOfferProjectId] = React.useState(null)
  const [selectedCompanyId, setSelectedCompanyId] = React.useState("")
  const [offerPrice, setOfferPrice] = React.useState("")
  const [offerMessage, setOfferMessage] = React.useState("")
  const [offerLoading, setOfferLoading] = React.useState(false)

  const [reviewRating, setReviewRating] = React.useState(5)
  const [reviewText, setReviewText] = React.useState("")
  const [reviewImageFile, setReviewImageFile] = React.useState(null)
  const [reviewLoading, setReviewLoading] = React.useState(false)
  const [activeReviewProjectId, setActiveReviewProjectId] = React.useState(null)

  const [filterCategory, setFilterCategory] = React.useState("")
  const [filterLocation, setFilterLocation] = React.useState("")

  const categories = [
    "Smíði", "Rafmagn", "Pípulagnir", "Málun", "Múrverk", "Flísalagnir",
    "Gólfefni", "Þakvinna", "Gluggar og hurðir", "Einangrun", "Jarðvinna",
    "Steypuvinna", "Pallasmíði", "Girðingar", "Garðvinna", "Trjáklippingar",
    "Snjómokstur", "Þrif", "Flutningar", "Bílaþjónusta", "Fasteignaþjónusta",
    "Ljósmyndun", "Vefsíðugerð", "Grafísk hönnun", "Bókhald", "Tölvuþjónusta",
    "Veitingaþjónusta", "Viðburðaþjónusta", "Öryggiskerfi", "Annað"
  ]

  const locations = [
    { name: "Reykjavík", lat: 64.1466, lng: -21.9426 },
    { name: "Reykjanesbær", lat: 63.9998, lng: -22.5583 },
    { name: "Akureyri", lat: 65.6885, lng: -18.1262 },
    { name: "Selfoss", lat: 63.9335, lng: -20.9971 },
    { name: "Akranes", lat: 64.3218, lng: -22.0749 },
    { name: "Ísafjörður", lat: 66.0711, lng: -23.1278 },
    { name: "Egilsstaðir", lat: 65.2669, lng: -14.3948 }
  ]

  React.useEffect(() => {
    loadSession()
    loadProjects()
    loadCompanies()
    loadOffers()
    loadReviews()

    function handleHashChange() {
      setIsAdminPage(window.location.hash === "#admin")
    }

    window.addEventListener("hashchange", handleHashChange)

    const { data: authListener } = supabase.auth.onAuthStateChange((_event, session) => {
      const currentUser = session?.user || null
      setUser(currentUser)
      checkAdmin(currentUser)
    })

    return () => {
      window.removeEventListener("hashchange", handleHashChange)
      authListener.subscription.unsubscribe()
    }
  }, [])

  async function loadSession() {
    const { data } = await supabase.auth.getSession()
    const currentUser = data.session?.user || null
    setUser(currentUser)
    checkAdmin(currentUser)
  }

  async function checkAdmin(currentUser) {
    if (!currentUser) {
      setIsAdmin(false)
      return
    }

    const { data } = await supabase
      .from("admins")
      .select("*")
      .eq("email", currentUser.email)
      .maybeSingle()

    setIsAdmin(!!data)
  }

  async function loadProjects() {
    const { data, error } = await supabase.from("verkefni").select("*").order("created_at", { ascending: false })
    if (!error) setProjects(data || [])
  }

  async function loadCompanies() {
    const { data, error } = await supabase.from("fyrirtaeki").select("*").order("created_at", { ascending: false })
    if (!error) setCompanies(data || [])
  }

  async function loadOffers() {
    const { data, error } = await supabase.from("tilbod").select("*").order("created_at", { ascending: false })
    if (!error) setOffers(data || [])
  }

  async function loadReviews() {
    const { data, error } = await supabase.from("reviews").select("*").order("created_at", { ascending: false })
    if (!error) setReviews(data || [])
  }

  function parsePrice(priceText) {
    if (!priceText) return 0
    const cleaned = String(priceText).replace(/[^\d]/g, "")
    return Number(cleaned || 0)
  }

  function formatISK(amount) {
    return new Intl.NumberFormat("is-IS").format(amount) + " kr"
  }

  function stars(rating) {
    return "★★★★★".slice(0, rating) + "☆☆☆☆☆".slice(0, 5 - rating)
  }

  function setLocationPreset(name) {
    const found = locations.find((item) => item.name === name)
    if (!found) return
    setLocation(name)
    setMapLat(found.lat)
    setMapLng(found.lng)
  }

  async function handleAuth() {
    if (!authEmail || !authPassword) {
      alert("Settu inn netfang og lykilorð.")
      return
    }

    setAuthLoading(true)

    if (authMode === "signup") {
      const { error } = await supabase.auth.signUp({ email: authEmail, password: authPassword })
      setAuthLoading(false)

      if (error) return alert("Villa við nýskráningu.")
      alert("Aðgangur stofnaður.")
      setAuthEmail("")
      setAuthPassword("")
      return
    }

    const { error } = await supabase.auth.signInWithPassword({ email: authEmail, password: authPassword })
    setAuthLoading(false)

    if (error) return alert("Rangt netfang eða lykilorð.")
    alert("Innskráning tókst.")
    setAuthEmail("")
    setAuthPassword("")
  }

  async function logout() {
    await supabase.auth.signOut()
    setUser(null)
    setIsAdmin(false)
  }

  async function uploadToBucket(file) {
    if (!file) return null

    const fileExt = file.name.split(".").pop()
    const fileName = `${Date.now()}-${Math.random().toString(36).substring(2)}.${fileExt}`

    const { error } = await supabase.storage.from("verkefni-myndir").upload(fileName, file)

    if (error) {
      alert("Mynd náði ekki að uploadast.")
      return null
    }

    const { data } = supabase.storage.from("verkefni-myndir").getPublicUrl(fileName)
    return data.publicUrl
  }

  async function submitProject() {
    if (!user) {
      alert("Þú þarft að stofna aðgang eða skrá þig inn áður en þú setur inn verkefni.")
      window.location.hash = "#login"
      return
    }

    if (!title || !description || !contact) {
      alert("Vinsamlegast fylltu út titil, lýsingu og síma/netfang.")
      return
    }

    setLoading(true)
    const imageUrl = await uploadToBucket(imageFile)

    const { error } = await supabase.from("verkefni").insert([{
      title,
      category,
      description,
      location,
      contact,
      image_url: imageUrl,
      user_id: user.id,
      status: "opið",
      map_lat: mapLat,
      map_lng: mapLng
    }])

    setLoading(false)

    if (error) return alert("Villa kom upp við að senda verkefni.")

    alert("Verkefni sent inn!")
    setTitle("")
    setCategory("")
    setDescription("")
    setLocation("")
    setContact("")
    setImageFile(null)
    loadProjects()
  }

  async function submitCompany() {
    if (!user) {
      alert("Þú þarft að stofna aðgang eða skrá þig inn áður en þú skráir fyrirtæki.")
      window.location.hash = "#login"
      return
    }

    if (!companyName || !companyKennitala || !companyCategory || !companyPhone || !companyEmail) {
      alert("Til að skrá fyrirtæki þarftu að fylla út: nafn, kennitölu, flokk, síma og netfang.")
      return
    }

    setCompanyLoading(true)

    const { error } = await supabase.from("fyrirtaeki").insert([{
      company_name: companyName,
      kennitala: companyKennitala,
      category: companyCategory,
      contact: companyPhone + " / " + companyEmail,
      phone: companyPhone,
      email: companyEmail,
      address: companyAddress,
      website: companyWebsite,
      description: companyDescription,
      verified: false,
      user_id: user.id
    }])

    setCompanyLoading(false)

    if (error) return alert("Villa kom upp við að skrá fyrirtæki.")

    alert("Fyrirtæki skráð.")
    setCompanyName("")
    setCompanyKennitala("")
    setCompanyCategory("")
    setCompanyPhone("")
    setCompanyEmail("")
    setCompanyAddress("")
    setCompanyWebsite("")
    setCompanyDescription("")
    loadCompanies()
  }

  async function submitOffer(projectId) {
    if (!user) {
      alert("Þú þarft að vera skráður inn sem fyrirtæki til að senda tilboð.")
      window.location.hash = "#login"
      return
    }

    const userCompanies = companies.filter((company) => company.user_id === user.id)

    if (userCompanies.length === 0) {
      alert("Þú þarft fyrst að skrá fyrirtæki áður en þú getur sent tilboð.")
      window.location.hash = "#fyrirtaeki"
      return
    }

    const selectedCompany = userCompanies.find((company) => String(company.id) === String(selectedCompanyId))

    if (!selectedCompany) return alert("Veldu fyrirtæki sem sendir tilboðið.")
    if (!offerPrice) return alert("Settu inn verð fyrir tilboðið.")

    setOfferLoading(true)

    const { error } = await supabase.from("tilbod").insert([{
      project_id: projectId,
      company_name: selectedCompany.company_name,
      price: offerPrice,
      message: offerMessage,
      contact: selectedCompany.phone + " / " + selectedCompany.email,
      user_id: user.id
    }])

    setOfferLoading(false)

    if (error) return alert("Villa kom upp við að senda tilboð.")

    try {
      await emailjs.send("service_p90mrr8", "template_6fp7aiu", {
        title: "Nýtt tilboð á verkefni",
        name: selectedCompany.company_name,
        email: selectedCompany.email,
        message:
          "Nýtt tilboð hefur verið sent inn á Verktilbod.is\n\n" +
          "Fyrirtæki: " + selectedCompany.company_name + "\n" +
          "Kennitala: " + selectedCompany.kennitala + "\n" +
          "Verð: " + offerPrice + "\n" +
          "Sími: " + selectedCompany.phone + "\n" +
          "Netfang: " + selectedCompany.email + "\n\n" +
          "Skilaboð:\n" + (offerMessage || "Engin skilaboð")
      })
    } catch (emailError) {
      console.log("EmailJS villa:", emailError)
    }

    alert("Tilboð sent inn!")
    setSelectedCompanyId("")
    setOfferPrice("")
    setOfferMessage("")
    setActiveOfferProjectId(null)
    loadOffers()
  }

  async function acceptOffer(projectId, offerId) {
    if (!user) return alert("Þú þarft að vera skráður inn til að samþykkja tilboð.")

    const project = projects.find((p) => p.id === projectId)

    if (!project || project.user_id !== user.id) {
      alert("Þú getur aðeins samþykkt tilboð á verkefni sem þú settir sjálfur inn.")
      return
    }

    if (!confirm("Ertu viss um að þú viljir samþykkja þetta tilboð?")) return

    const { error } = await supabase
      .from("verkefni")
      .update({ status: "samþykkt", selected_offer_id: offerId })
      .eq("id", projectId)

    if (error) return alert("Villa kom upp við að samþykkja tilboð.")

    alert("Tilboð samþykkt.")
    loadProjects()
  }

  async function submitReview(project, offer) {
    if (!user) return alert("Þú þarft að vera skráður inn.")
    if (project.user_id !== user.id) return alert("Þú getur aðeins gefið umsögn fyrir þín eigin verkefni.")
    if (!reviewText) return alert("Skrifaðu umsögn.")

    setReviewLoading(true)
    const imageUrl = await uploadToBucket(reviewImageFile)

    const { error } = await supabase.from("reviews").insert([{
      project_id: project.id,
      offer_id: offer.id,
      company_name: offer.company_name,
      rating: reviewRating,
      review_text: reviewText,
      image_url: imageUrl,
      user_id: user.id
    }])

    setReviewLoading(false)

    if (error) return alert("Villa kom upp við að senda umsögn.")

    alert("Umsögn send.")
    setReviewRating(5)
    setReviewText("")
    setReviewImageFile(null)
    setActiveReviewProjectId(null)
    loadReviews()
  }

  async function deleteProject(projectId) {
    if (!isAdmin) return alert("Aðeins admin getur eytt verkefnum.")
    if (!confirm("Eyða þessu verkefni? Öll tilboð tengd því eyðast líka.")) return
    await supabase.from("tilbod").delete().eq("project_id", projectId)
    await supabase.from("verkefni").delete().eq("id", projectId)
    loadProjects()
    loadOffers()
  }

  async function deleteCompany(companyId) {
    if (!isAdmin) return alert("Aðeins admin getur eytt fyrirtækjum.")
    if (!confirm("Eyða þessu fyrirtæki?")) return
    await supabase.from("fyrirtaeki").delete().eq("id", companyId)
    loadCompanies()
  }

  async function deleteOffer(offerId) {
    if (!isAdmin) return alert("Aðeins admin getur eytt tilboðum.")
    if (!confirm("Eyða þessu tilboði?")) return
    await supabase.from("tilbod").delete().eq("id", offerId)
    loadOffers()
  }

  async function toggleVerified(company) {
    if (!isAdmin) return alert("Aðeins admin getur breytt verified stöðu.")
    await supabase.from("fyrirtaeki").update({ verified: !company.verified }).eq("id", company.id)
    loadCompanies()
  }

  function getOffersForProject(projectId) {
    return offers.filter((offer) => offer.project_id === projectId)
  }

  function getReviewsForCompany(companyName) {
    return reviews.filter((review) => review.company_name === companyName)
  }

  function companyAverageRating(companyName) {
    const companyReviews = getReviewsForCompany(companyName)
    if (companyReviews.length === 0) return null
    const total = companyReviews.reduce((sum, review) => sum + Number(review.rating || 0), 0)
    return (total / companyReviews.length).toFixed(1)
  }

  const filteredProjects = projects.filter((project) => {
    const categoryMatch = filterCategory ? project.category === filterCategory : true
    const locationMatch = filterLocation
      ? (project.location || "").toLowerCase().includes(filterLocation.toLowerCase())
      : true

    return categoryMatch && locationMatch
  })

  const myCompanies = user ? companies.filter((company) => company.user_id === user.id) : []
  const myOffers = user ? offers.filter((offer) => offer.user_id === user.id) : []
  const myProjects = user ? projects.filter((project) => project.user_id === user.id) : []

  const acceptedProjects = projects.filter((project) => project.status === "samþykkt" && project.selected_offer_id)
  const acceptedOffers = acceptedProjects.map((project) => {
    const offer = offers.find((offer) => offer.id === project.selected_offer_id)
    if (!offer) return null
    return { ...offer, project_title: project.title, project_id: project.id, value: parsePrice(offer.price) }
  }).filter(Boolean)

  const totalAcceptedValue = acceptedOffers.reduce((sum, offer) => sum + offer.value, 0)

  const revenueByCompany = acceptedOffers.reduce((acc, offer) => {
    if (!acc[offer.company_name]) {
      acc[offer.company_name] = { company_name: offer.company_name, count: 0, total: 0 }
    }
    acc[offer.company_name].count += 1
    acc[offer.company_name].total += offer.value
    return acc
  }, {})

  const companyRevenueList = Object.values(revenueByCompany).sort((a, b) => b.total - a.total)

  function MapView() {
    return (
      <div className="rounded-[36px] border border-slate-200 bg-white p-6 shadow-sm">
        <div className="mb-6">
          <h2 className="text-3xl font-black">Verkefni á korti</h2>
          <p className="text-slate-600 mt-2">Yfirlit yfir verkefni eftir staðsetningu.</p>
        </div>

        <div className="relative h-[420px] rounded-[30px] bg-gradient-to-br from-blue-50 to-slate-100 border border-slate-200 overflow-hidden">
          <div className="absolute left-[42%] top-[10%] h-[75%] w-[30%] rounded-full border-4 border-blue-300 bg-blue-100/50 rotate-12"></div>
          <div className="absolute left-[35%] top-[30%] h-[35%] w-[18%] rounded-full border-4 border-blue-300 bg-blue-100/60 -rotate-12"></div>

          {filteredProjects.map((project) => {
            const lat = project.map_lat || 64.1265
            const lng = project.map_lng || -21.8174
            const x = Math.min(85, Math.max(12, 50 + (lng + 19) * 9))
            const y = Math.min(85, Math.max(10, 45 - (lat - 64.5) * 20))

            return (
              <div
                key={project.id}
                className="absolute group"
                style={{ left: x + "%", top: y + "%" }}
              >
                <div className="h-5 w-5 rounded-full bg-blue-600 ring-4 ring-white shadow-xl"></div>
                <div className="hidden group-hover:block absolute z-20 left-6 top-0 w-64 rounded-2xl bg-white p-4 shadow-2xl border border-slate-200">
                  <div className="text-sm font-bold text-blue-700">{project.category || "Annað"}</div>
                  <div className="font-black mt-1">{project.title}</div>
                  <div className="text-sm text-slate-500 mt-1">📍 {project.location || "Óskráð"}</div>
                </div>
              </div>
            )
          })}
        </div>
      </div>
    )
  }

  if (isAdminPage) {
    return (
      <div className="min-h-screen bg-white text-slate-900">
        <section className="py-20">
          <div className="max-w-7xl mx-auto px-6">

            {!user ? (
              <div className="max-w-md mx-auto rounded-[32px] border border-slate-200 bg-slate-50 p-8">
                <h2 className="text-3xl font-black mb-6 text-center">Admin innskráning</h2>
                <div className="grid gap-5">
                  <input value={authEmail} onChange={(e) => setAuthEmail(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Netfang" />
                  <input type="password" value={authPassword} onChange={(e) => setAuthPassword(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Lykilorð" />
                  <button onClick={handleAuth} disabled={authLoading} className="rounded-2xl bg-blue-600 px-6 py-5 text-lg font-black text-white">
                    {authLoading ? "Augnablik..." : "Innskrá"}
                  </button>
                </div>
              </div>
            ) : !isAdmin ? (
              <div className="max-w-xl mx-auto rounded-[32px] border border-red-200 bg-red-50 p-8 text-center">
                <h2 className="text-3xl font-black text-red-800 mb-4">Ekki admin aðgangur</h2>
                <button onClick={logout} className="mt-6 rounded-2xl bg-slate-950 px-6 py-4 font-black text-white">Skrá út</button>
              </div>
            ) : (
              <div>
                <div className="mb-14 flex flex-col md:flex-row md:items-center md:justify-between gap-5">
                  <div>
                    <h1 className="text-5xl font-black tracking-tight">Admin Dashboard</h1>
                    <p className="text-slate-600 text-lg mt-3">Yfirsýn yfir verkefni, fyrirtæki, tilboð, reviews og tekjur fyrirtækja.</p>
                  </div>
                  <button onClick={logout} className="rounded-2xl bg-slate-950 px-6 py-4 font-black text-white">Skrá út</button>
                </div>

                <div className="grid md:grid-cols-2 lg:grid-cols-6 gap-5 mb-12">
                  <div className="rounded-3xl bg-slate-950 text-white p-6"><div className="text-sm text-slate-300">Verkefni</div><div className="text-4xl font-black mt-2">{projects.length}</div></div>
                  <div className="rounded-3xl bg-blue-600 text-white p-6"><div className="text-sm text-blue-100">Fyrirtæki</div><div className="text-4xl font-black mt-2">{companies.length}</div></div>
                  <div className="rounded-3xl bg-green-600 text-white p-6"><div className="text-sm text-green-100">Tilboð</div><div className="text-4xl font-black mt-2">{offers.length}</div></div>
                  <div className="rounded-3xl bg-purple-600 text-white p-6"><div className="text-sm text-purple-100">Reviews</div><div className="text-4xl font-black mt-2">{reviews.length}</div></div>
                  <div className="rounded-3xl bg-orange-600 text-white p-6"><div className="text-sm text-orange-100">Samþykkt verk</div><div className="text-4xl font-black mt-2">{acceptedOffers.length}</div></div>
                  <div className="rounded-3xl bg-emerald-600 text-white p-6"><div className="text-sm text-emerald-100">Virði verka</div><div className="text-2xl font-black mt-3">{formatISK(totalAcceptedValue)}</div></div>
                </div>

                <div className="grid lg:grid-cols-2 gap-8 mb-12">
                  <div className="rounded-3xl border border-slate-200 bg-slate-50 p-6">
                    <h2 className="text-2xl font-black mb-6">Tekjur fyrirtækja í gegnum síðuna</h2>

                            <h5 className="font-black mb-4">Umsögn fyrir {selectedOffer.company_name}</h5>

                            <select value={reviewRating} onChange={(e) => setReviewRating(Number(e.target.value))} className="w-full rounded-2xl border border-slate-300 px-5 py-4 mb-4">
                              <option value={5}>★★★★★ 5 stjörnur</option>
                              <option value={4}>★★★★ 4 stjörnur</option>
                              <option value={3}>★★★ 3 stjörnur</option>
                              <option value={2}>★★ 2 stjörnur</option>
                              <option value={1}>★ 1 stjarna</option>
                            </select>

                            <textarea value={reviewText} onChange={(e) => setReviewText(e.target.value)} className="w-full min-h-28 rounded-2xl border border-slate-300 px-5 py-4 mb-4" placeholder="Skrifaðu umsögn..." />

                            <input type="file" accept="image/*" onChange={(e) => setReviewImageFile(e.target.files[0])} className="w-full rounded-2xl border border-slate-300 px-5 py-4 bg-white mb-4" />

                            <button onClick={() => submitReview(project, selectedOffer)} disabled={reviewLoading} className="rounded-2xl bg-blue-600 px-5 py-4 font-black text-white">
                              {reviewLoading ? "Sendi..." : "Senda umsögn"}
                            </button>
                          </div>
                        )}
                      </div>
                    )
                  })}
                </div>
              </div>

              <div className="rounded-[32px] border border-slate-200 bg-white p-7 shadow-sm">
                <h3 className="text-2xl font-black mb-6">Mín fyrirtæki</h3>
                {myCompanies.length === 0 && <p className="text-slate-600">Þú hefur ekki skráð fyrirtæki ennþá.</p>}

                <div className="space-y-5">
                  {myCompanies.map((company) => (
                    <div key={company.id} className="rounded-3xl bg-slate-50 border border-slate-200 p-6">
                      <div className="text-sm font-black text-green-700 mb-3">{company.verified ? "✅ Verified" : "Í skoðun"}</div>
                      <h4 className="text-xl font-black">{company.company_name}</h4>
                      <p className="mt-2 text-sm font-bold text-blue-700">{company.category || "Óskráð"}</p>
                      <p className="mt-2 text-sm text-slate-500">Kennitala: {company.kennitala}</p>
                      <p className="mt-2 text-sm text-yellow-500">{companyAverageRating(company.company_name) ? "★ " + companyAverageRating(company.company_name) : "Engin rating"}</p>
                    </div>
                  ))}
                </div>
              </div>

              <div className="rounded-[32px] border border-slate-200 bg-white p-7 shadow-sm">
                <h3 className="text-2xl font-black mb-6">Mín tilboð</h3>
                {myOffers.length === 0 && <p className="text-slate-600">Þú hefur ekki sent nein tilboð.</p>}

                <div className="space-y-5">
                  {myOffers.map((offer) => {
                    const project = projects.find((p) => p.id === offer.project_id)
                    return (
                      <div key={offer.id} className="rounded-3xl bg-slate-50 border border-slate-200 p-6">
                        <div className="text-sm font-bold text-blue-700 mb-3">{project ? project.title : "Óþekkt verkefni"}</div>
                        <h4 className="text-xl font-black">{offer.company_name}</h4>
                        <p className="mt-2 text-2xl font-black text-green-700">{offer.price}</p>
                        <p className="mt-3 text-slate-600">{offer.message || "Engin skilaboð"}</p>
                      </div>
                    )
                  })}
                </div>
              </div>
            </div>
          )}
        </div>
      </section>

      <section id="fyrirtaeki" className="py-24 bg-white border-t border-slate-200">
        <div className="max-w-6xl mx-auto px-6">
          <div className="rounded-[44px] bg-slate-950 p-10 lg:p-16 text-white shadow-2xl">
            <div className="grid lg:grid-cols-2 gap-12 items-center">
              <div>
                <h2 className="text-4xl lg:text-5xl font-black tracking-tight">Skrá fyrirtæki</h2>
                <p className="text-xl text-slate-300 mt-6 leading-relaxed">Til að senda tilboð þarf að vera með skráð fyrirtæki með kennitölu og helstu upplýsingum.</p>
              </div>

              <div className="rounded-[32px] bg-white p-7 text-slate-900">
                <div className="grid gap-5">
                  {!user && <div className="rounded-2xl bg-yellow-50 border border-yellow-200 p-4 text-sm font-bold text-yellow-800">Þú þarft að vera skráður inn til að skrá fyrirtæki.</div>}

                  <input value={companyName} onChange={(e) => setCompanyName(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Nafn fyrirtækis *" />
                  <input value={companyKennitala} onChange={(e) => setCompanyKennitala(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Kennitala fyrirtækis *" />

                  <select value={companyCategory} onChange={(e) => setCompanyCategory(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4">
                    <option value="">Veldu flokk *</option>
                    {categories.map((category) => <option key={category}>{category}</option>)}
                  </select>

                  <input value={companyPhone} onChange={(e) => setCompanyPhone(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Sími *" />
                  <input value={companyEmail} onChange={(e) => setCompanyEmail(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Netfang *" />
                  <input value={companyAddress} onChange={(e) => setCompanyAddress(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Heimilisfang" />
                  <input value={companyWebsite} onChange={(e) => setCompanyWebsite(e.target.value)} className="rounded-2xl border border-slate-300 px-5 py-4" placeholder="Vefsíða" />
                  <textarea value={companyDescription} onChange={(e) => setCompanyDescription(e.target.value)} className="min-h-28 rounded-2xl border border-slate-300 px-5 py-4" placeholder="Lýsing á fyrirtæki" />

                  <button onClick={submitCompany} disabled={companyLoading || !user} className="rounded-2xl bg-blue-600 hover:bg-blue-700 transition px-6 py-5 text-lg font-black text-white disabled:bg-slate-400">
                    {companyLoading ? "Skrái..." : "Skrá fyrirtæki"}
                  </button>
                </div>
              </div>
            </div>
          </div>

          <div className="mt-14 grid md:grid-cols-3 gap-6">
            {companies.filter((c) => c.verified).slice(0, 6).map((company) => (
              <div key={company.id} className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div className="text-sm font-black text-green-700 mb-3">✅ Verified</div>
                <h3 className="text-xl font-black">{company.company_name}</h3>
                <p className="mt-2 text-sm text-blue-700 font-bold">{company.category || "Óskráð"}</p>
                <p className="mt-2 text-sm text-yellow-500">{companyAverageRating(company.company_name) ? "★ " + companyAverageRating(company.company_name) : "Engin rating"}</p>
              </div>
            ))}
          </div>
        </div>
      </section>

      <section className="py-24 bg-slate-50 border-t border-slate-200">
        <div className="max-w-6xl mx-auto px-6">
          <h2 className="text-4xl font-black mb-12">Umsagnir</h2>

          <div className="grid md:grid-cols-3 gap-6">
            {reviews.slice(0, 9).map((review) => (
              <div key={review.id} className="rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
                <div className="text-xl text-yellow-500">{stars(review.rating || 5)}</div>
                <h3 className="text-xl font-black mt-3">{review.company_name}</h3>
                <p className="text-slate-600 mt-3">{review.review_text}</p>
                {review.image_url && <img src={review.image_url} className="mt-5 h-40 w-full rounded-2xl object-cover" />}
              </div>
            ))}
          </div>

          {reviews.length === 0 && (
            <div className="rounded-3xl border border-dashed border-slate-300 bg-white p-12 text-center">
              <h3 className="text-2xl font-black">Engar umsagnir ennþá</h3>
              <p className="text-slate-600 mt-2">Umsagnir birtast hér þegar verk hafa verið samþykkt og metin.</p>
            </div>
          )}
        </div>
      </section>

      <footer className="border-t border-slate-200 bg-white py-10">
        <div className="max-w-7xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4">
          <div className="flex items-center gap-3">
            <div className="w-10 h-10 rounded-2xl bg-blue-600 text-white flex items-center justify-center font-black">V</div>
            <div className="text-2xl font-black tracking-tight">Verktilbod<span className="text-blue-600">.is</span></div>
          </div>
          <div className="text-sm text-slate-500">© 2026 Verktilbod — Sendu inn verk. Fáðu tilboð.</div>
        </div>
      </footer>
    </div>
  )
}

const root = ReactDOM.createRoot(document.getElementById("root"))
root.render(<App />)

  </script>
</body>
</html>
